<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bebidas — Pick-up 27</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            pick: {
              50: '#f6f7f9', 100: '#eceef2', 200: '#d5d9e2', 300: '#b0b8c8',
              400: '#8592a8', 500: '#667590', 600: '#525e78', 700: '#434c61',
              800: '#3a4154', 900: '#343948',
            },
            fresh: {
              50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
              400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    html { scroll-behavior: smooth; }
    .search-overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
    .search-overlay.active { opacity: 1; pointer-events: auto; }
    .search-panel { transform: translateY(-20px); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; opacity: 0; }
    .search-overlay.active .search-panel { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body class="bg-white text-pick-900">

  <div id="searchOverlay" class="search-overlay fixed inset-0 z-[60] bg-white/95 backdrop-blur-md flex items-start justify-center pt-24 px-4">
    <div class="search-panel w-full max-w-2xl">
      <div class="flex items-center justify-between mb-6">
        <p class="text-sm text-pick-400">Buscar productos</p>
        <button onclick="toggleSearch()" class="p-2 text-pick-400 hover:text-pick-700 transition">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="relative">
        <input type="text" placeholder="¿Qué estás buscando?" class="w-full pl-12 pr-4 py-4 bg-pick-50 border border-pick-200 rounded-2xl text-lg focus:outline-none focus:ring-2 focus:ring-fresh-400 focus:border-transparent transition">
        <svg class="absolute left-4 top-4 w-6 h-6 text-pick-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <p class="text-center text-pick-400 mt-8 text-sm">Próximamente podrás buscar todos nuestros productos</p>
    </div>
  </div>

  <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-pick-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-8 h-8 bg-fresh-500 rounded-lg flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          </div>
          <span class="text-xl font-bold tracking-tight">Pick-up <span class="text-fresh-600">27</span></span>
        </a>
        <div class="hidden md:flex flex-1 max-w-xl mx-8">
          <div class="relative w-full">
            <input type="text" placeholder="Buscar productos..." class="w-full pl-10 pr-4 py-2.5 bg-pick-50 border border-pick-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-fresh-400 focus:border-transparent transition">
            <svg class="absolute left-3.5 top-2.5 w-4 h-4 text-pick-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="toggleSearch()" class="p-2 text-pick-500 hover:text-pick-800 transition md:hidden">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
          <button class="hidden sm:flex p-2 text-pick-500 hover:text-pick-800 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          </button>
          <button class="relative p-2 text-pick-500 hover:text-pick-800 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-fresh-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center">0</span>
          </button>
        </div>
      </div>
    </div>
    <nav class="border-t border-pick-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-1 py-2 overflow-x-auto scrollbar-hide">
          <a href="index.html" class="px-4 py-1.5 text-sm font-medium text-pick-600 hover:bg-pick-50 rounded-full whitespace-nowrap transition">Todos</a>
          <a href="frutas-y-viandas.html" class="px-4 py-1.5 text-sm font-medium text-pick-600 hover:bg-pick-50 rounded-full whitespace-nowrap transition">Frutas y Viandas</a>
          <a href="despensa.html" class="px-4 py-1.5 text-sm font-medium text-pick-600 hover:bg-pick-50 rounded-full whitespace-nowrap transition">Despensa</a>
          <a href="lacteos-y-huevos.html" class="px-4 py-1.5 text-sm font-medium text-pick-600 hover:bg-pick-50 rounded-full whitespace-nowrap transition">Lácteos y Huevos</a>
          <a href="bebidas.html" class="px-4 py-1.5 text-sm font-medium text-white bg-fresh-500 rounded-full whitespace-nowrap transition">Bebidas</a>
        </div>
      </div>
    </nav>
  </header>

  <section class="relative h-64 sm:h-80 lg:h-96 overflow-hidden">
    <img src="https://images.unsplash.com/photo-1544145945-f90425340c7e?w=1200&h=500&fit=crop" alt="Bebidas" class="w-full h-full object-cover">
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-transparent"></div>
    <div class="absolute bottom-0 left-0 right-0 p-6 sm:p-10 max-w-7xl mx-auto">
      <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white">Bebidas</h1>
    </div>
  </section>

  <section class="py-16 sm:py-24">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <div class="max-w-md mx-auto">
        <div class="w-16 h-16 bg-pick-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-pick-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-pick-900 mb-3">Próximamente</h2>
        <p class="text-pick-500 mb-8">Estamos preparando los productos de esta categoría. Vuelve pronto.</p>
        <a href="index.html" class="inline-flex items-center px-6 py-3 bg-fresh-500 text-white font-medium rounded-full hover:bg-fresh-600 transition shadow-lg shadow-fresh-500/25">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          Volver al inicio
        </a>
      </div>
    </div>
  </section>

  <footer class="bg-pick-50 border-t border-pick-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      <div class="flex items-center justify-center gap-2 mb-4">
        <div class="w-6 h-6 bg-fresh-500 rounded-md flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        </div>
        <span class="text-lg font-bold tracking-tight">Pick-up <span class="text-fresh-600">27</span></span>
      </div>
      <p class="text-center text-sm text-pick-400">&copy; 2026 Pick-up 27</p>
    </div>
  </footer>

  <script>
    function toggleSearch() {
      const overlay = document.getElementById('searchOverlay');
      overlay.classList.toggle('active');
      if (overlay.classList.contains('active')) {
        setTimeout(() => overlay.querySelector('input').focus(), 100);
      }
    }
  </script>
</body>
</html>
