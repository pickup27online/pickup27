<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Fondo circular azul -->
  <circle cx="100" cy="100" r="95" fill="#003d82" stroke="#e0e0e0" stroke-width="4"/>
  
  <!-- Número 27 -->
  <text x="100" y="110" font-size="80" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">27</text>
  
  <!-- Icono de carrito/flecha hacia arriba -->
  <g transform="translate(100, 140)">
    <!-- Línea vertical de la flecha -->
    <line x1="0" y1="0" x2="0" y2="-15" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Punta de la flecha -->
    <polygon points="0,-15 -6,-8 6,-8" fill="white"/>
    
    <!-- Pequeño carrito -->
    <rect x="-12" y="5" width="24" height="8" fill="none" stroke="white" stroke-width="2" rx="1"/>
    <circle cx="-8" cy="15" r="2" fill="white"/>
    <circle cx="8" cy="15" r="2" fill="white"/>
  </g>
  
  <!-- Texto "PICK-UP" -->
  <text x="100" y="165" font-size="14" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif" letter-spacing="2">PICK-UP</text>
  
  <!-- Texto "27 Online Shop" pequeño abajo -->
  <text x="100" y="180" font-size="10" text-anchor="middle" fill="white" font-family="Arial, sans-serif" opacity="0.9">27 Online Shop</text>
</svg>
